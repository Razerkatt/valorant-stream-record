name: Update Stream Record

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-record:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check Twitch status
        env:
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
        run: |
          TOKEN=$(curl -X POST \
          "https://id.twitch.tv/oauth2/token?client_id=$TWITCH_CLIENT_ID&client_secret=$TWITCH_CLIENT_SECRET&grant_type=client_credentials" \
          | jq -r '.access_token')

          RESPONSE=$(curl -H "Client-ID: $TWITCH_CLIENT_ID" \
          -H "Authorization: Bearer $TOKEN" \
          "https://api.twitch.tv/helix/streams?user_login=Razerkatt")

          if echo "$RESPONSE" | grep -q '"data":\[\]'; then
            echo "@Razerkatt's stream is currently offline." > record.txt
          else
            echo "Current stream: 0W-0L | ±0 RR" > record.txt
          fi

      - name: Test Valorant API
        env:
          HENRIK_API_KEY: ${{ secrets.HENRIK_API_KEY }}
        run: |
          RESPONSE=$(curl -H "Authorization: $HENRIK_API_KEY" \
          "https://api.henrikdev.xyz/valorant/v1/account/razerkatt/0101")

          echo "$RESPONSE"

      - name: Save record
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add record.txt
          git commit -m "Update stream record" || exit 0
          git push
